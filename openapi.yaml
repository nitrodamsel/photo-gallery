openapi: 3.1.0
info:
  title: Gallery REST API
  description: |
    A full-featured REST API for the Gallery application.
    Manage images, tags, and perform advanced searches.
    
    ## Authentication
    All API endpoints require an API key passed as a Bearer token in the Authorization header:
    ```
    Authorization: Bearer <your-api-key>
    ```
    
    Generate a key using: `node scripts/generate-api-key.js --label "My App"`
    
  version: 1.0.0
  contact:
    name: Gallery API Support
  license:
    name: MIT

servers:
  - url: /api/v1
    description: API v1

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: NOT_FOUND
            message:
              type: string
              description: Human-readable error message
              example: Image not found

    Pagination:
      type: object
      properties:
        total:
          type: integer
          description: Total number of records
          example: 150
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Records per page
          example: 20
        pages:
          type: integer
          description: Total number of pages
          example: 8

    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: nature
        slug:
          type: string
          example: nature
        imageCount:
          type: integer
          description: Number of images with this tag
          example: 42
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"

    ImageMini:
      type: object
      description: Abbreviated image representation used in lists
      properties:
        id:
          type: integer
          example: 1
        originalName:
          type: string
          example: sunset.jpg
        mimeType:
          type: string
          example: image/jpeg
        fileSize:
          type: integer
          description: File size in bytes
          example: 2048576
        width:
          type: integer
          example: 4000
        height:
          type: integer
          example: 3000
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"

    Image:
      allOf:
        - $ref: '#/components/schemas/ImageMini'
        - type: object
          properties:
            description:
              type: string
              nullable: true
              example: A beautiful sunset over the ocean
            title:
              type: string
              nullable: true
              example: Ocean Sunset
            rating:
              type: integer
              minimum: 1
              maximum: 5
              nullable: true
              example: 4
            cameraMake:
              type: string
              nullable: true
              example: Canon
            cameraModel:
              type: string
              nullable: true
              example: EOS R5
            focalLength:
              type: string
              nullable: true
              example: "50mm"
            aperture:
              type: string
              nullable: true
              example: "f/2.8"
            shutterSpeed:
              type: string
              nullable: true
              example: "1/500"
            iso:
              type: integer
              nullable: true
              example: 400
            takenAt:
              type: string
              format: date-time
              nullable: true
            latitude:
              type: number
              format: double
              nullable: true
              example: 51.5074
            longitude:
              type: number
              format: double
              nullable: true
              example: -0.1278
            tags:
              type: array
              items:
                $ref: '#/components/schemas/Tag'
            updatedAt:
              type: string
              format: date-time
              example: "2024-01-16T08:00:00.000Z"

    ImageList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        pagination:
          $ref: '#/components/schemas/Pagination'

    TagList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        pagination:
          $ref: '#/components/schemas/Pagination'

    SearchResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        pagination:
          $ref: '#/components/schemas/Pagination'
        filters:
          type: object
          description: Filters applied to this search

    SearchFacets:
      type: object
      properties:
        data:
          type: object
          properties:
            cameraMakes:
              type: array
              items:
                type: object
                properties:
                  value:
                    type: string
                    example: Canon
                  count:
                    type: integer
                    example: 25
            tags:
              type: array
              items:
                $ref: '#/components/schemas/Tag'
            dateRange:
              type: object
              properties:
                earliest:
                  type: string
                  format: date-time
                  nullable: true
                latest:
                  type: string
                  format: date-time
                  nullable: true

paths:
  /images:
    get:
      summary: List images
      description: Returns a paginated list of images, optionally filtered by search query.
      operationId: listImages
      tags:
        - Images
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: search
          in: query
          description: Full-text search query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageList'
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Upload an image
      description: Upload a new image file with optional metadata.
      operationId: uploadImage
      tags:
        - Images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: The image file to upload
                description:
                  type: string
                  description: Optional description
                tags:
                  type: string
                  description: Comma-separated list of tag names
                  example: nature,landscape,sunset
      responses:
        '201':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '400':
          description: Bad request — missing or invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /images/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Image ID
        schema:
          type: integer

    get:
      summary: Get image by ID
      description: Returns full details for a single image including EXIF data and tags.
      operationId: getImage
      tags:
        - Images
      responses:
        '200':
          description: Image details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update image metadata
      description: Update one or more metadata fields for an image, including tags.
      operationId: updateImage
      tags:
        - Images
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                title:
                  type: string
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                tags:
                  description: Array of tag names (replaces existing tags)
                  oneOf:
                    - type: array
                      items:
                        type: string
                    - type: string
                      description: Comma-separated tag names
      responses:
        '200':
          description: Updated image
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete an image
      description: Permanently deletes an image and its associated files and thumbnails.
      operationId: deleteImage
      tags:
        - Images
      responses:
        '204':
          description: Image deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tags:
    get:
      summary: List tags
      description: Returns all tags with their image counts, sorted by popularity.
      operationId: listTags
      tags:
        - Tags
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: search
          in: query
          description: Filter tags by name
          schema:
            type: string
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a tag
      description: Create a new tag. If the tag already exists, returns the existing tag.
      operationId: createTag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: nature
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '200':
          description: Tag already exists (returned existing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Tag ID
        schema:
          type: integer

    get:
      summary: Get tag by ID
      description: Returns a single tag with its image count.
      operationId: getTag
      tags:
        - Tags
      responses:
        '200':
          description: Tag details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Rename a tag
      description: Update the name (and slug) of an existing tag.
      operationId: updateTag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: landscape
      responses:
        '200':
          description: Updated tag
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a tag
      description: Permanently deletes a tag and removes it from all associated images.
      operationId: deleteTag
      tags:
        - Tags
      responses:
        '204':
          description: Tag deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search:
    get:
      summary: Search images
      description: Search images with full filtering support including text, tags, camera, date range, and rating.
      operationId: searchImages
      tags:
        - Search
      parameters:
        - name: q
          in: query
          description: Full-text search query
          schema:
            type: string
        - name: tags
          in: query
          description: Comma-separated tag names to filter by
          schema:
            type: string
          example: nature,landscape
        - name: cameraMake
          in: query
          description: Filter by camera manufacturer
          schema:
            type: string
          example: Canon
        - name: cameraModel
          in: query
          description: Filter by camera model
          schema:
            type: string
        - name: dateFrom
          in: query
          description: Filter images taken on or after this date (ISO 8601)
          schema:
            type: string
            format: date
          example: "2024-01-01"
        - name: dateTo
          in: query
          description: Filter images taken on or before this date (ISO 8601)
          schema:
            type: string
            format: date
          example: "2024-12-31"
        - name: minRating
          in: query
          description: Minimum star rating (1-5)
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [createdAt, takenAt, fileSize, rating]
            default: createdAt
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search/facets:
    get:
      summary: Get search facets
      description: Returns available filter values (camera makes, popular tags, date range) for building search UIs.
      operationId: getSearchFacets
      tags:
        - Search
      responses:
        '200':
          description: Search facets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchFacets'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

tags:
  - name: Images
    description: Image management operations
  - name: Tags
    description: Tag management operations
  - name: Search
    description: Search and discovery operations