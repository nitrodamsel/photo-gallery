openapi: 3.1.0
info:
  title: Photo Gallery API
  version: 1.0.0
  description: |
    REST API for the Photo Gallery application. Provides full access to images, tags,
    and search functionality. All endpoints require API key authentication.
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: /api/v1
    description: Version 1

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: Use `Authorization: Bearer <api-key>` header

  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 8

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Image not found

    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: landscape
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TagWithCount:
      allOf:
        - $ref: '#/components/schemas/Tag'
        - type: object
          properties:
            imageCount:
              type: integer
              example: 42

    Image:
      type: object
      properties:
        id:
          type: integer
          example: 1
        filename:
          type: string
          example: 1234567890-photo.jpg
        originalName:
          type: string
          example: vacation-photo.jpg
        title:
          type: string
          nullable: true
          example: Sunset at the beach
        description:
          type: string
          nullable: true
          example: A beautiful sunset photo
        altText:
          type: string
          nullable: true
        mimeType:
          type: string
          example: image/jpeg
        fileSize:
          type: integer
          example: 2048576
        width:
          type: integer
          nullable: true
          example: 4032
        height:
          type: integer
          nullable: true
          example: 3024
        isPublic:
          type: boolean
          example: true
        cameraMake:
          type: string
          nullable: true
          example: Apple
        cameraModel:
          type: string
          nullable: true
          example: iPhone 14 Pro
        takenAt:
          type: string
          format: date-time
          nullable: true
        latitude:
          type: number
          nullable: true
          example: 48.8566
        longitude:
          type: number
          nullable: true
          example: 2.3522
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ImageUpdate:
      type: object
      properties:
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        altText:
          type: string
          nullable: true
        isPublic:
          type: boolean

    ImageListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        pagination:
          $ref: '#/components/schemas/Pagination'

    ImageResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Image'

    TagListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TagWithCount'

    TagResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Tag'

    SearchResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        pagination:
          $ref: '#/components/schemas/Pagination'
        query:
          type: object
          properties:
            q:
              type: string
              nullable: true
            tag:
              type: string
              nullable: true
            dateFrom:
              type: string
              nullable: true
            dateTo:
              type: string
              nullable: true
            mimeType:
              type: string
              nullable: true
            sort:
              type: string
            order:
              type: string

    FacetsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            tags:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  count:
                    type: integer
            mimeTypes:
              type: array
              items:
                type: object
                properties:
                  mimeType:
                    type: string
                  count:
                    type: integer

paths:
  /images:
    get:
      summary: List images
      description: Returns a paginated list of images.
      operationId: listImages
      tags:
        - Images
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: search
          in: query
          description: Filter by original filename
          schema:
            type: string
      responses:
        '200':
          description: List of images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /images/{id}:
    get:
      summary: Get image by ID
      operationId: getImage
      tags:
        - Images
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Image details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update image metadata
      operationId: updateImage
      tags:
        - Images
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageUpdate'
      responses:
        '200':
          description: Updated image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete an image
      operationId: deleteImage
      tags:
        - Images
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Image deleted
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tags:
    get:
      summary: List all tags
      operationId: listTags
      tags:
        - Tags
      responses:
        '200':
          description: List of tags with image counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new tag
      operationId: createTag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: landscape
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '200':
          description: Tag already exists (returned existing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tags/{id}:
    get:
      summary: Get tag by ID
      operationId: getTag
      tags:
        - Tags
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tag details with images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Rename a tag
      operationId: updateTag
      tags:
        - Tags
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Updated tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a tag
      operationId: deleteTag
      tags:
        - Tags
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Tag deleted
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search:
    get:
      summary: Search images
      operationId: searchImages
      tags:
        - Search
      parameters:
        - name: q
          in: query
          description: Full-text search query
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag name
          schema:
            type: string
        - name: dateFrom
          in: query
          description: Filter images uploaded after this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          description: Filter images uploaded before this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: mimeType
          in: query
          description: Filter by MIME type prefix (e.g. image/jpeg)
          schema:
            type: string
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
            enum: [createdAt, fileSize, originalName, title]
            default: createdAt
        - name: order
          in: query
          description: Sort order
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search/facets:
    get:
      summary: Get search facets
      description: Returns tag and MIME type distributions for filtering
      operationId: getSearchFacets
      tags:
        - Search
      responses:
        '200':
          description: Facet counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacetsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'