openapi: 3.1.0

info:
  title: Image Gallery API
  version: 1.0.0
  description: |
    A RESTful API for managing an image gallery with full CRUD operations,
    tag management, and powerful search capabilities.
    
    ## Authentication
    All API endpoints require an API key passed as a Bearer token in the
    `Authorization` header:
    
    ```
    Authorization: Bearer <your-api-key>
    ```
    
    Generate API keys using the CLI script:
    ```
    node scripts/generate-api-key.js --label "My App"
    ```
    
    ## Rate Limiting
    The API is rate-limited to **100 requests per minute** per API key.
    Rate limit information is included in response headers:
    - `RateLimit-Limit`: Maximum requests per window
    - `RateLimit-Remaining`: Remaining requests in current window
    - `RateLimit-Reset`: Time when the window resets (Unix timestamp)
    
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: /api/v1
    description: API v1

security:
  - BearerAuth: []

tags:
  - name: Images
    description: Image management operations
  - name: Tags
    description: Tag management operations
  - name: Search
    description: Search and filter operations

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: hex
      description: API key generated via the CLI script

  schemas:
    # Pagination metadata
    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total:
          type: integer
          minimum: 0
          example: 142
        totalPages:
          type: integer
          minimum: 0
          example: 8
        hasNextPage:
          type: boolean
          example: true
        hasPrevPage:
          type: boolean
          example: false

    # Error response
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: NOT_FOUND
            message:
              type: string
              description: Human-readable error description
              example: Image not found.

    # Tag schema
    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Nature
        slug:
          type: string
          example: nature
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    # Tag input
    TagInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Nature

    # Image schema
    Image:
      type: object
      properties:
        id:
          type: integer
          example: 42
        filename:
          type: string
          example: abc123def456.jpg
        originalName:
          type: string
          example: sunset-photo.jpg
        mimeType:
          type: string
          example: image/jpeg
        fileSize:
          type: integer
          description: File size in bytes
          example: 2048576
        width:
          type: integer
          nullable: true
          example: 3840
        height:
          type: integer
          nullable: true
          example: 2160
        title:
          type: string
          nullable: true
          example: Beautiful Sunset
        description:
          type: string
          nullable: true
          example: A stunning sunset over the ocean
        altText:
          type: string
          nullable: true
          example: Orange and pink sunset over calm ocean waters
        cameraMake:
          type: string
          nullable: true
          example: Canon
        cameraModel:
          type: string
          nullable: true
          example: EOS R5
        focalLength:
          type: string
          nullable: true
          example: "50mm"
        aperture:
          type: string
          nullable: true
          example: "f/2.8"
        shutterSpeed:
          type: string
          nullable: true
          example: "1/500s"
        iso:
          type: integer
          nullable: true
          example: 100
        takenAt:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-21T18:45:00Z"
        latitude:
          type: number
          format: double
          nullable: true
          example: 37.7749
        longitude:
          type: number
          format: double
          nullable: true
          example: -122.4194
        Tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    # Image update input
    ImageUpdateInput:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
          nullable: true
          example: Updated Title
        description:
          type: string
          nullable: true
          example: Updated description
        altText:
          type: string
          nullable: true
          example: Updated alt text
        tags:
          type: array
          items:
            type: integer
          description: Array of tag IDs to associate with this image
          example: [1, 3, 5]

    # Paginated image list
    ImageList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # Paginated tag list
    TagList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # Search result
    SearchResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        filters:
          type: object
          properties:
            query:
              type: string
            tags:
              type: array
              items:
                type: string
            mimeType:
              type: string
              nullable: true
            dateFrom:
              type: string
              nullable: true
            dateTo:
              type: string
              nullable: true
            cameraMake:
              type: string
              nullable: true
            cameraModel:
              type: string
              nullable: true
            sortBy:
              type: string
            sortOrder:
              type: string
        pagination:
          $ref: '#/components/schemas/Pagination'

    # Search facets
    SearchFacets:
      type: object
      properties:
        data:
          type: object
          properties:
            mimeTypes:
              type: array
              items:
                type: object
                properties:
                  value:
                    type: string
                    example: image/jpeg
                  count:
                    type: integer
                    example: 87
            cameraMakes:
              type: array
              items:
                type: object
                properties:
                  value:
                    type: string
                    example: Canon
                  count:
                    type: integer
                    example: 34
            topTags:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  slug:
                    type: string
                  count:
                    type: integer
            dateRange:
              type: object
              properties:
                earliest:
                  type: string
                  format: date-time
                  nullable: true
                latest:
                  type: string
                  format: date-time
                  nullable: true

  # Reusable parameters
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  # Reusable responses
  responses:
    UnauthorizedError:
      description: API key missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Missing or invalid Authorization header.

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found.

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: Invalid input data.

    RateLimitError:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many requests, please try again later.

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INTERNAL_ERROR
              message: An unexpected error occurred.

paths:
  # ─────────────────────────────────────────────
  # IMAGES
  # ─────────────────────────────────────────────
  /images:
    get:
      operationId: listImages
      summary: List images
      description: Returns a paginated list of images with their associated tags.
      tags: [Images]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          description: Filter by filename (partial match)
          schema:
            type: string
        - name: mimeType
          in: query
          description: Filter by MIME type
          schema:
            type: string
            example: image/jpeg
      responses:
        '200':
          description: Paginated list of images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageList'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: uploadImage
      summary: Upload an image
      description: Upload a new image file with optional metadata.
      tags: [Images]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: The image file to upload
                title:
                  type: string
                  description: Optional title for the image
                description:
                  type: string
                  description: Optional description
                altText:
                  type: string
                  description: Alt text for accessibility
      responses:
        '201':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

  /images/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Image ID
        schema:
          type: integer

    get:
      operationId: getImage
      summary: Get an image
      description: Returns a single image by ID with its tags and metadata.
      tags: [Images]
      responses:
        '200':
          description: Image details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      operationId: updateImage
      summary: Update an image
      description: Update image metadata (title, description, alt text, tags).
      tags: [Images]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageUpdateInput'
      responses:
        '200':
          description: Updated image
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deleteImage
      summary: Delete an image
      description: Permanently deletes an image and its associated file.
      tags: [Images]
      responses:
        '200':
          description: Image deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Image deleted successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────────────────────────
  # TAGS
  # ─────────────────────────────────────────────
  /tags:
    get:
      operationId: listTags
      summary: List tags
      description: Returns a paginated list of all tags.
      tags: [Tags]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          description: Filter by tag name (partial match)
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagList'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createTag
      summary: Create a tag
      description: Creates a new tag. Returns 409 if a tag with the same name already exists.
      tags: [Tags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagInput'
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Tag already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

  /tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Tag ID
        schema:
          type: integer

    get:
      operationId: getTag
      summary: Get a tag
      description: Returns a single tag by ID.
      tags: [Tags]
      responses:
        '200':
          description: Tag details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      operationId: updateTag
      summary: Rename a tag
      description: Renames an existing tag.
      tags: [Tags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagInput'
      responses:
        '200':
          description: Updated tag
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          description: Tag name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deleteTag
      summary: Delete a tag
      description: Permanently deletes a tag and removes it from all associated images.
      tags: [Tags]
      responses:
        '200':
          description: Tag deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Tag deleted successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─────────────────────────────────────────────
  # SEARCH
  # ─────────────────────────────────────────────
  /search:
    get:
      operationId: searchImages
      summary: Search images
      description: |
        Full-text search across images with support for multiple filters.
        Supports filtering by tags, MIME type, date range, camera make/model, and more.
      tags: [Search]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: q
          in: query
          description: Full-text search query (searches title, description, filename)
          schema:
            type: string
        - name: tags
          in: query
          description: Comma-separated list of tag slugs to filter by
          schema:
            type: string
            example: nature,landscape
        - name: mimeType
          in: query
          description: Filter by MIME type
          schema:
            type: string
            example: image/jpeg
        - name: dateFrom
          in: query
          description: Filter images uploaded from this date (ISO 8601)
          schema:
            type: string
            format: date
            example: "2024-01-01"
        - name: dateTo
          in: query
          description: Filter images uploaded until this date (ISO 8601)
          schema:
            type: string
            format: date
            example: "2024-12-31"
        - name: cameraMake
          in: query
          description: Filter by camera manufacturer
          schema:
            type: string
            example: Canon
        - name: cameraModel
          in: query
          description: Filter by camera model
          schema:
            type: string
            example: EOS R5
        - name: sortBy
          in: query
          description: Sort field
          schema:
            type: string
            enum: [createdAt, updatedAt, originalName, fileSize, title]
            default: createdAt
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'

  /search/facets:
    get:
      operationId: getSearchFacets
      summary: Get search facets
      description: |
        Returns aggregate data useful for building filter UIs:
        available MIME types, camera makes, top tags, and the date range of uploads.
      tags: [Search]
      responses:
        '200':
          description: Search facets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchFacets'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalError'