openapi: 3.1.0
info:
  title: Image Gallery API
  description: |
    REST API for the Image Gallery application.
    
    All `/api/v1/*` endpoints require API key authentication via the `Authorization: Bearer <key>` header.
    
    Rate limit: 100 requests per minute per API key.
  version: 1.0.0
  contact:
    name: API Support
  license:
    name: MIT

servers:
  - url: /api/v1
    description: API v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API key obtained via `node scripts/generate-api-key.js`

  schemas:
    Image:
      type: object
      properties:
        id:
          type: integer
          description: Unique image ID
        filename:
          type: string
          description: Stored filename on disk
        originalName:
          type: string
          description: Original uploaded filename
        mimeType:
          type: string
          example: image/jpeg
        fileSize:
          type: integer
          description: File size in bytes
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        cameraMake:
          type: string
          nullable: true
          description: EXIF camera make
        cameraModel:
          type: string
          nullable: true
          description: EXIF camera model
        takenAt:
          type: string
          format: date-time
          nullable: true
          description: EXIF date/time original
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: landscape
        createdAt:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5
        hasNext:
          type: boolean
        hasPrev:
          type: boolean

    Error:
      type: object
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Image not found

    ImageListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        pagination:
          $ref: '#/components/schemas/Pagination'

    ImageResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Image'

    TagListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        pagination:
          $ref: '#/components/schemas/Pagination'

    TagResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Tag'

    SearchFacets:
      type: object
      properties:
        tags:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Tag'
              - type: object
                properties:
                  imageCount:
                    type: integer
        cameraMakes:
          type: array
          items:
            type: object
            properties:
              cameraMake:
                type: string
              count:
                type: integer
        dateRange:
          type: object
          properties:
            earliest:
              type: string
              format: date-time
              nullable: true
            latest:
              type: string
              format: date-time
              nullable: true

security:
  - BearerAuth: []

paths:
  /images:
    get:
      summary: List images
      description: Returns a paginated list of images, optionally filtered.
      operationId: listImages
      tags:
        - Images
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: search
          in: query
          description: Search in filename, title, and description
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, originalName, fileSize, title]
            default: createdAt
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated list of images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Upload an image
      description: Upload a new image file with optional metadata.
      operationId: uploadImage
      tags:
        - Images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, GIF, WebP, TIFF, BMP)
                title:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          description: No file provided or invalid file type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /images/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Image ID

    get:
      summary: Get image by ID
      operationId: getImage
      tags:
        - Images
      responses:
        '200':
          description: Image details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update image metadata
      operationId: updateImage
      tags:
        - Images
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                  description: Replace all tags with this list
      responses:
        '200':
          description: Updated image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete image
      operationId: deleteImage
      tags:
        - Images
      responses:
        '204':
          description: Image deleted
        '404':
          description: Image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tags:
    get:
      summary: List tags
      operationId: listTags
      tags:
        - Tags
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a tag
      operationId: createTag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: landscape
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '200':
          description: Tag already exists (returned existing tag)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Tag ID

    get:
      summary: Get tag by ID
      operationId: getTag
      tags:
        - Tags
      responses:
        '200':
          description: Tag details with image count
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/TagResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          imageCount:
                            type: integer
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Rename a tag
      operationId: updateTag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Renamed tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Tag name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a tag
      operationId: deleteTag
      tags:
        - Tags
      responses:
        '204':
          description: Tag deleted
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search:
    get:
      summary: Search images
      description: Full-text search with multiple filter options.
      operationId: searchImages
      tags:
        - Search
      parameters:
        - name: q
          in: query
          description: Search query
          schema:
            type: string
        - name: tags
          in: query
          description: Comma-separated tag names to filter by
          schema:
            type: string
            example: landscape,nature
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: minSize
          in: query
          description: Minimum file size in bytes
          schema:
            type: integer
        - name: maxSize
          in: query
          description: Maximum file size in bytes
          schema:
            type: integer
        - name: cameraMake
          in: query
          schema:
            type: string
        - name: cameraModel
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ImageListResponse'
                  - type: object
                    properties:
                      meta:
                        type: object
                        properties:
                          query:
                            type: string
                            nullable: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search/facets:
    get:
      summary: Get search facets
      description: Returns aggregated filter options for building search UI.
      operationId: getSearchFacets
      tags:
        - Search
      responses:
        '200':
          description: Search facets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SearchFacets'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

tags:
  - name: Images
    description: Image management endpoints
  - name: Tags
    description: Tag management endpoints
  - name: Search
    description: Search and discovery endpoints