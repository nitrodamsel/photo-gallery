openapi: 3.1.0
info:
  title: Gallery API
  version: 1.0.0
  description: |
    REST API for the Gallery application. Manage images, tags, and search with full CRUD support.
    
    ## Authentication
    All `/api/v1/*` endpoints require an API key sent as a Bearer token:
    ```
    Authorization: Bearer <your-api-key>
    ```
    Generate an API key using: `node scripts/generate-api-key.js --label "My App"`
    
    ## Rate Limiting
    100 requests per minute per API key. Headers `RateLimit-Limit`, `RateLimit-Remaining`, and `RateLimit-Reset` are included in responses.
  contact:
    name: Gallery API Support
  license:
    name: MIT

servers:
  - url: /api/v1
    description: API v1

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API key generated via `node scripts/generate-api-key.js`

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Image with id 'abc' not found.

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5
        hasNext:
          type: boolean
          example: true
        hasPrev:
          type: boolean
          example: false

    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: landscape
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"

    Image:
      type: object
      properties:
        id:
          type: integer
          example: 42
        filename:
          type: string
          example: "1704067200000-photo.jpg"
        originalName:
          type: string
          example: "photo.jpg"
        title:
          type: string
          nullable: true
          example: "Mountain Sunset"
        description:
          type: string
          nullable: true
          example: "Beautiful sunset over the mountains"
        mimeType:
          type: string
          example: "image/jpeg"
        fileSize:
          type: integer
          example: 2048576
        width:
          type: integer
          nullable: true
          example: 4032
        height:
          type: integer
          nullable: true
          example: 3024
        rating:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          example: 4
        exifCameraMake:
          type: string
          nullable: true
          example: "Apple"
        exifCameraModel:
          type: string
          nullable: true
          example: "iPhone 14 Pro"
        exifDateTaken:
          type: string
          format: date-time
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-01-15T10:30:00Z"

    ImageList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        pagination:
          $ref: '#/components/schemas/Pagination'

    ImageSingle:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Image'

    TagList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tag'

    TagSingle:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Tag'

    SearchFacets:
      type: object
      properties:
        data:
          type: object
          properties:
            tags:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/Tag'
                  - type: object
                    properties:
                      imageCount:
                        type: integer
            mimeTypes:
              type: array
              items:
                type: object
                properties:
                  mimeType:
                    type: string
                  count:
                    type: integer
            dateRange:
              type: object
              properties:
                oldest:
                  type: string
                  format: date-time
                  nullable: true
                newest:
                  type: string
                  format: date-time
                  nullable: true

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      description: Items per page (max 100)
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Missing or invalid Authorization header.
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many requests. Limit: 100 requests per minute.
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /images:
    get:
      summary: List images
      description: Returns a paginated list of all images.
      operationId: listImages
      tags:
        - Images
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          description: Filter by filename
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      summary: Upload an image
      description: Upload a new image file with optional metadata and tags.
      operationId: uploadImage
      tags:
        - Images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, GIF, WebP)
                title:
                  type: string
                  description: Image title
                description:
                  type: string
                  description: Image description
                tags:
                  type: string
                  description: Comma-separated tag names
      responses:
        '201':
          description: Image created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingle'
        '400':
          description: Bad request (missing file or validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /images/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Image ID
        schema:
          type: integer

    get:
      summary: Get image by ID
      operationId: getImage
      tags:
        - Images
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

    patch:
      summary: Update image metadata
      operationId: updateImage
      tags:
        - Images
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                tags:
                  type: string
                  description: Comma-separated tag names (replaces existing tags)
      responses:
        '200':
          description: Image updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

    delete:
      summary: Delete image
      operationId: deleteImage
      tags:
        - Images
      responses:
        '204':
          description: Image deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /tags:
    get:
      summary: List all tags
      operationId: listTags
      tags:
        - Tags
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

    post:
      summary: Create a tag
      operationId: createTag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: landscape
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagSingle'
        '200':
          description: Tag already exists (returned existing tag)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagSingle'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Tag ID
        schema:
          type: integer

    get:
      summary: Get tag by ID
      description: Returns a tag with its associated images.
      operationId: getTag
      tags:
        - Tags
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagSingle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Rename a tag
      operationId: updateTag
      tags:
        - Tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: new-tag-name
      responses:
        '200':
          description: Tag updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagSingle'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Tag name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a tag
      operationId: deleteTag
      tags:
        - Tags
      responses:
        '204':
          description: Tag deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /search:
    get:
      summary: Search images
      description: Full-text search with filtering, sorting, and pagination.
      operationId: searchImages
      tags:
        - Search
      parameters:
        - name: q
          in: query
          description: Search query (matches title, description, filename)
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag name
          schema:
            type: string
        - name: dateFrom
          in: query
          description: Filter images from this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          description: Filter images up to this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: mimeType
          in: query
          description: Filter by MIME type
          schema:
            type: string
            example: image/jpeg
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
            enum: [createdAt, title, fileSize]
            default: createdAt
        - name: order
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ImageList'
                  - type: object
                    properties:
                      query:
                        type: object
                        description: Echoed query parameters
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /search/facets:
    get:
      summary: Get search facets
      description: Returns aggregated data for building filter UIs (top tags, mime types, date range).
      operationId: getSearchFacets
      tags:
        - Search
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchFacets'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

tags:
  - name: Images
    description: Image management (CRUD + upload)
  - name: Tags
    description: Tag management
  - name: Search
    description: Search and filter images