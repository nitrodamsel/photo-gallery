openapi: 3.1.0
info:
  title: Image Gallery API
  description: |
    REST API for the Image Gallery application.
    
    ## Authentication
    All API endpoints (except `/api/docs`) require an API key passed as a Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <your-api-key>
    ```
    
    Generate an API key using the CLI:
    ```bash
    node scripts/generate-api-key.js --label "My App"
    ```
    
    ## Rate Limiting
    The API is rate-limited to **100 requests per minute** per API key.
    Rate limit headers are included in all responses:
    - `RateLimit-Limit`: Maximum requests per window
    - `RateLimit-Remaining`: Remaining requests in current window
    - `RateLimit-Reset`: Seconds until window resets
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://api.example.com
    description: Production server

security:
  - BearerAuth: []

tags:
  - name: Images
    description: Image upload, retrieval, and management
  - name: Tags
    description: Tag management and association
  - name: Search
    description: Full-text and faceted search

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: hex
      description: API key generated via `scripts/generate-api-key.js`

  schemas:
    Image:
      type: object
      properties:
        id:
          type: integer
          description: Unique image identifier
          example: 42
        filename:
          type: string
          description: Stored filename on disk
          example: "1720000000000-123456789.jpg"
        originalName:
          type: string
          description: Original filename at upload time
          example: "vacation-photo.jpg"
        title:
          type: string
          nullable: true
          description: Human-readable title
          example: "Sunset at the Beach"
        description:
          type: string
          nullable: true
          description: Optional description
          example: "A beautiful sunset captured in Malibu"
        mimeType:
          type: string
          description: MIME type of the image
          example: "image/jpeg"
        fileSize:
          type: integer
          description: File size in bytes
          example: 2048576
        width:
          type: integer
          nullable: true
          description: Image width in pixels
          example: 1920
        height:
          type: integer
          nullable: true
          description: Image height in pixels
          example: 1080
        cameraMake:
          type: string
          nullable: true
          description: Camera manufacturer from EXIF
          example: "Canon"
        cameraModel:
          type: string
          nullable: true
          description: Camera model from EXIF
          example: "EOS R5"
        takenAt:
          type: string
          format: date-time
          nullable: true
          description: Date/time photo was taken (from EXIF)
          example: "2024-06-15T14:30:00.000Z"
        latitude:
          type: number
          format: double
          nullable: true
          description: GPS latitude from EXIF
          example: 34.0194
        longitude:
          type: number
          format: double
          nullable: true
          description: GPS longitude from EXIF
          example: -118.4912
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          description: Associated tags
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"
      required:
        - id
        - filename
        - mimeType
        - fileSize
        - createdAt

    ImageCreate:
      type: object
      properties:
        title:
          type: string
          description: Optional title for the image
          example: "My Photo"
        description:
          type: string
          description: Optional description
          example: "A great photo"
      required: []

    ImageUpdate:
      type: object
      properties:
        title:
          type: string
          example: "Updated Title"
        description:
          type: string
          example: "Updated description"
        isPublic:
          type: boolean
          example: true
        tags:
          type: array
          items:
            type: string
          description: Replace all tags with this list
          example: ["nature", "landscape"]

    Tag:
      type: object
      properties:
        id:
          type: integer
          description: Unique tag identifier
          example: 7
        name:
          type: string
          description: Tag name (lowercase)
          example: "nature"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-10T08:00:00.000Z"
      required:
        - id
        - name

    TagCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Tag name
          example: "nature"

    TagUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: New tag name
          example: "wildlife"

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 20
        total:
          type: integer
          description: Total number of items
          example: 150
        totalPages:
          type: integer
          description: Total number of pages
          example: 8
        hasNext:
          type: boolean
          description: Whether there is a next page
          example: true
        hasPrev:
          type: boolean
          description: Whether there is a previous page
          example: false
      required:
        - page
        - limit
        - total
        - totalPages

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: "NOT_FOUND"
            message:
              type: string
              description: Human-readable error message
              example: "Image not found"
          required:
            - code
            - message
      required:
        - error

    SearchFacets:
      type: object
      properties:
        mimeTypes:
          type: array
          items:
            type: object
            properties:
              mimeType:
                type: string
                example: "image/jpeg"
              count:
                type: integer
                example: 42
        topTags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        dateRange:
          type: object
          properties:
            earliest:
              type: string
              format: date-time
              nullable: true
            latest:
              type: string
              format: date-time
              nullable: true
        sizeStats:
          type: object
          properties:
            minSize:
              type: integer
              nullable: true
            maxSize:
              type: integer
              nullable: true
            avgSize:
              type: number
              nullable: true

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      description: Items per page (max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: "Missing or invalid Authorization header"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: "Resource not found"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: "Tag name is required"
    RateLimitExceeded:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: "Too many requests, please try again later."

paths:
  /api/v1/images:
    get:
      summary: List images
      description: Returns a paginated list of images. Supports filtering by search term and MIME type.
      operationId: listImages
      tags: [Images]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          description: Search term for original filename
          schema:
            type: string
          example: "vacation"
        - name: mimeType
          in: query
          description: Filter by MIME type
          schema:
            type: string
          example: "image/jpeg"
      responses:
        '200':
          description: Paginated list of images
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Image'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    post:
      summary: Upload an image
      description: Upload a new image file. Accepts multipart/form-data.
      operationId: uploadImage
      tags: [Images]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file to upload
                title:
                  type: string
                  description: Optional title for the image
                description:
                  type: string
                  description: Optional description
      responses:
        '201':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '400':
          description: Invalid or missing file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/images/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Image ID
        schema:
          type: integer
        example: 42

    get:
      summary: Get an image
      description: Returns a single image by ID with its associated tags.
      operationId: getImage
      tags: [Images]
      responses:
        '200':
          description: Image details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    patch:
      summary: Update an image
      description: Update image metadata and/or tags. Only provided fields are updated.
      operationId: updateImage
      tags: [Images]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageUpdate'
      responses:
        '200':
          description: Updated image
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Image'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    delete:
      summary: Delete an image
      description: Permanently delete an image and its associated data.
      operationId: deleteImage
      tags: [Images]
      responses:
        '204':
          description: Image deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/tags:
    get:
      summary: List tags
      description: Returns a paginated list of all tags.
      operationId: listTags
      tags: [Tags]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: search
          in: query
          description: Filter tags by name
          schema:
            type: string
          example: "nature"
      responses:
        '200':
          description: Paginated list of tags
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    post:
      summary: Create a tag
      description: Create a new tag. If the tag already exists, it is returned with a 200 status.
      operationId: createTag
      tags: [Tags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '201':
          description: Tag created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '200':
          description: Tag already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Tag ID
        schema:
          type: integer
        example: 7

    get:
      summary: Get a tag
      description: Returns a single tag with up to 20 associated images.
      operationId: getTag
      tags: [Tags]
      responses:
        '200':
          description: Tag details with associated images
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Tag'
                      - type: object
                        properties:
                          images:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                filename:
                                  type: string
                                title:
                                  type: string
                                  nullable: true
                                createdAt:
                                  type: string
                                  format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    patch:
      summary: Rename a tag
      description: Update the name of an existing tag.
      operationId: updateTag
      tags: [Tags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagUpdate'
      responses:
        '200':
          description: Updated tag
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Tag name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    delete:
      summary: Delete a tag
      description: Delete a tag and remove all its image associations.
      operationId: deleteTag
      tags: [Tags]
      responses:
        '204':
          description: Tag deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/search:
    get:
      summary: Search images
      description: |
        Full-text and faceted search for images.
        Supports filtering by query string, MIME type, date range, file size, and tags.
      operationId: searchImages
      tags: [Search]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: q
          in: query
          description: Search query (searches title, originalName, description)
          schema:
            type: string
          example: "sunset"
        - name: mimeType
          in: query
          description: Filter by MIME type
          schema:
            type: string
          example: "image/jpeg"
        - name: tags
          in: query
          description: Comma-separated list of tag names to filter by
          schema:
            type: string
          example: "nature,landscape"
        - name: dateFrom
          in: query
          description: Filter images uploaded on or after this date (ISO 8601)
          schema:
            type: string
            format: date-time
          example: "2024-01-01T00:00:00Z"
        - name: dateTo
          in: query
          description: Filter images uploaded on or before this date (ISO 8601)
          schema:
            type: string
            format: date-time
          example: "2024-12-31T23:59:59Z"
        - name: minSize
          in: query
          description: Minimum file size in bytes
          schema:
            type: integer
          example: 1024
        - name: maxSize
          in: query
          description: Maximum file size in bytes
          schema:
            type: integer
          example: 10485760
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [createdAt, title, fileSize, originalName]
            default: createdAt
        - name: sortDir
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Search results with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Image'
                  query:
                    type: object
                    description: Echo of the query parameters
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v1/search/facets:
    get:
      summary: Get search facets
      description: Returns aggregated facet data for building filter UIs (MIME types, top tags, date range, size statistics).
      operationId: getSearchFacets
      tags: [Search]
      responses:
        '200':
          description: Aggregated facets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SearchFacets'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'